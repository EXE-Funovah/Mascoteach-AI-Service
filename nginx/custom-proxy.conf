# Custom proxy settings cho Mascoteach AI Service
# File này được mount vào nginxproxy/nginx-proxy tại /etc/nginx/conf.d/

# Tăng timeout cho các request AI generation (Gemini API có thể mất 2-5 phút)
proxy_read_timeout 300s;
proxy_connect_timeout 60s;
proxy_send_timeout 300s;

# Cho phép upload file lớn (tài liệu PDF, DOCX, hình ảnh)
client_max_body_size 50M;

# Hỗ trợ WebSocket cho mascot-live
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $connection_upgrade;
